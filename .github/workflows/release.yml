name: Build & Release
# (test) 워크플로우 파일 push 권한(workflow 스코프) 확인용 주석 — 동작 변경 없음

# VERSION 파일이 바뀐 채로 main 에 push 되면 자동으로 EXE 빌드 + GitHub Release 를
# 만든다. 즉 "VERSION 수정 → 커밋 → push" 만 하면 배포된다(별도 태그 불필요).
# 이미 같은 버전 릴리즈가 있으면 중복 빌드 없이 건너뛴다.
on:
  push:
    branches: [main]
    paths: ['VERSION']       # 평소: VERSION 이 바뀐 채 main 에 push 되면 자동 배포
    tags: ['v*']             # 수동 재배포: git push origin v0.4.8 로 강제 실행
  workflow_dispatch:          # Actions 탭에서 수동 실행
    inputs:
      character_edit:
        description: '캐릭터 이미지 변경 허용'
        type: choice
        options: ['Y', 'N']
        default: 'Y'

jobs:
  build:
    runs-on: windows-latest

    permissions:
      contents: write   # Release 생성 및 파일 업로드 권한

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read VERSION
        id: ver
        shell: pwsh
        run: |
          $v = (Get-Content VERSION -Raw).Trim()
          "version=$v" >> $env:GITHUB_OUTPUT
          Write-Host "Version: $v"

      - name: Check existing release
        id: check
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "v${{ steps.ver.outputs.version }}"
          # 같은 버전 '릴리즈'가 이미 있으면 중복 빌드 건너뜀(태그만 있고 릴리즈 없으면 진행).
          gh release view $tag *> $null
          $exists = ($LASTEXITCODE -eq 0)
          if ($exists) {
            Write-Host "이미 릴리즈됨: $tag → 건너뜀"
            "skip=true" >> $env:GITHUB_OUTPUT
          } else {
            Write-Host "새 버전 릴리즈 진행: $tag"
            "skip=false" >> $env:GITHUB_OUTPUT
          }
          exit 0   # gh 가 남긴 exit code 로 스텝이 실패하지 않도록 고정

      - name: Setup Python 3.11
        if: steps.check.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        if: steps.check.outputs.skip != 'true'
        shell: pwsh
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Apply build flags (character edit)
        id: flags
        if: steps.check.outputs.skip != 'true'
        shell: pwsh
        run: |
          # 우선순위: 수동 실행 입력 > build/character_edit.txt > 기본 'Y'(허용)
          $choice = "${{ github.event.inputs.character_edit }}"
          if (-not $choice -and (Test-Path build/character_edit.txt)) {
            $choice = (Get-Content build/character_edit.txt -Raw).Trim()
          }
          if (-not $choice) { $choice = "Y" }
          $flag = "resources/character_edit_disabled.flag"
          if ($choice -match '^(N|n|0|off|false)$') {
            "disabled" | Set-Content -Encoding ascii $flag
            # 잠금 빌드 = 이미지 암호화 세트(N ⇒ 암호화).
            "encrypt=true" >> $env:GITHUB_OUTPUT
            Write-Host "캐릭터 이미지 변경: 비활성 (고정 이미지, 이미지 암호화)"
          } else {
            if (Test-Path $flag) { Remove-Item $flag }
            "encrypt=false" >> $env:GITHUB_OUTPUT
            Write-Host "캐릭터 이미지 변경: 허용"
          }

      - name: Pack resources (locked build only)
        if: steps.check.outputs.skip != 'true' && steps.flags.outputs.encrypt == 'true'
        shell: pwsh
        run: |
          # 평문 이미지를 AES-GCM 팩으로 묶고 임베드 키 모듈 생성.
          # 실패 시 job 실패(평문 유출 방지) — spec 은 팩 유무로 자동 분기한다.
          python build\pack_resources.py
          if (-not (Test-Path resources/resources.pak)) {
            Write-Error "resources.pak 생성 실패"
            exit 1
          }

      - name: Build EXE (PyInstaller)
        if: steps.check.outputs.skip != 'true'
        shell: pwsh
        run: |
          python -m PyInstaller --noconfirm build\character_todo.spec

      - name: Verify build output
        if: steps.check.outputs.skip != 'true'
        shell: pwsh
        run: |
          $exe = "dist\CharacterTodo.exe"
          if (-not (Test-Path $exe)) {
            Write-Error "빌드 산출물 없음: $exe"
            exit 1
          }
          $size = (Get-Item $exe).Length / 1MB
          Write-Host "EXE 크기: $([math]::Round($size,1)) MB"

      - name: Generate version.json
        if: steps.check.outputs.skip != 'true'
        shell: pwsh
        run: |
          $ver = "${{ steps.ver.outputs.version }}"
          $repo = "${{ github.repository }}"
          $dlUrl = "https://github.com/$repo/releases/download/v$ver/CharacterTodo.exe"
          $json = [ordered]@{ version = $ver; download_url = $dlUrl } | ConvertTo-Json
          $json | Set-Content -Encoding UTF8 dist\version.json
          Write-Host "version.json 생성됨:"
          Get-Content dist\version.json

      - name: Extract release notes from CHANGELOG
        if: steps.check.outputs.skip != 'true'
        shell: pwsh
        run: |
          $ver = "${{ steps.ver.outputs.version }}"
          # CHANGELOG.md 에서 '## [<버전>]' 섹션을 다음 '## ' 전까지 뽑아낸다.
          $notes = ""
          if (Test-Path CHANGELOG.md) {
            $capture = $false
            $buf = @()
            foreach ($line in (Get-Content CHANGELOG.md)) {
              if ($line -match "^##\s*\[?$([regex]::Escape($ver))\]?") { $capture = $true; continue }
              elseif ($capture -and $line -match "^##\s") { break }
              if ($capture) { $buf += $line }
            }
            $notes = ($buf -join "`n").Trim()
          }
          if (-not $notes) { $notes = "이 버전의 변경 내용이 CHANGELOG.md 에 없습니다." }
          $footer = "`n`n---`n### 설치 / 업데이트`n" +
                    "- 앱 내: 설정 → 앱 업데이트 → 업데이트 확인`n" +
                    "- 수동: 아래 ``CharacterTodo.exe`` 를 받아 기존 파일과 교체"
          ($notes + $footer) | Set-Content -Encoding UTF8 dist\RELEASE_NOTES.md
          Write-Host "릴리즈 노트:"
          Get-Content dist\RELEASE_NOTES.md

      - name: Create GitHub Release
        if: steps.check.outputs.skip != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.ver.outputs.version }}"   # 이 커밋에 태그를 만들어 릴리즈
          name: "v${{ steps.ver.outputs.version }}"
          body_path: dist/RELEASE_NOTES.md                 # CHANGELOG 에서 뽑은 패치노트
          files: |
            dist/CharacterTodo.exe
            dist/version.json
          draft: false
          prerelease: false
